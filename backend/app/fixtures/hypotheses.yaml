schema_version: "1.0"
version: hypotheses-1.5
pattern_definitions:
  symptoms:
    forwarded_traffic_spike:
      anomaly_types: [FORWARDED_TRAFFIC_SPIKE]
    downstream_degradation:
      anomaly_types: [CHECKOUT_LATENCY_HIGH, UPSTREAM_TIMEOUT, CHECKOUT_ERROR_ALERT]
    changed_source_distribution:
      anomaly_types: [SOURCE_DISTRIBUTION_CHANGE]
      raw_payload_true_keys: [source_distribution_changed]
    payment_timeout:
      anomaly_types: [UPSTREAM_TIMEOUT]
      event_types: [UPSTREAM_CONNECTION_TIMEOUT]
    database_utilization_high:
      anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
      event_types: [DB_CONNECTION_UTILIZATION]
      signal_value_gte: 0.90
    packet_loss:
      anomaly_types: [PACKET_LOSS_SPIKE]
    retransmissions:
      anomaly_types: [TCP_RETRANSMISSION_SPIKE]
    upstream_errors:
      anomaly_types: [UPSTREAM_SERVICE_FAILURE]
    service_failure_indicator:
      anomaly_types: [NETWORK_LATENCY_HIGH, CPU_SATURATION, MEMORY_SATURATION, TRACE_LATENCY_ANOMALY, TRACE_STRUCTURE_ANOMALY, DNS_RESOLUTION_FAILURE, TLS_HANDSHAKE_FAILURE]
    dns_errors:
      anomaly_types: [DNS_RESOLUTION_FAILURE]
    tls_handshake_errors:
      anomaly_types: [TLS_HANDSHAKE_FAILURE]
    resource_pressure:
      anomaly_types: [CPU_SATURATION, MEMORY_SATURATION, RESOURCE_SATURATION_ANOMALY]
    service_latency:
      anomaly_types: [SERVICE_LATENCY_HIGH]
    reconnaissance_fanout:
      anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, RECONNAISSANCE_ACTIVITY]
    rejected_connections:
      anomaly_types: [REJECTED_CONNECTION_SPIKE]
    scanner_authorized:
      event_types: [SCANNER_ALLOWLIST_MATCH]
      raw_payload_true_keys: [scanner_authorized, allowlisted]
    datanode_failure:
      anomaly_types: [DATANODE_IO_ERRORS, DISTRIBUTED_SYSTEM_FAILURE]
    trace_latency:
      anomaly_types: [TRACE_LATENCY_ANOMALY]
    trace_structure:
      anomaly_types: [TRACE_STRUCTURE_ANOMALY]
    namenode_failure:
      anomaly_types: [NAMENODE_FAILURE]
      event_types: [NAMENODE_HEALTH_FAILURE]
  propagation:
    gateway_pressure:
      anomaly_types: [FORWARDED_TRAFFIC_SPIKE, ACTIVE_CONNECTION_SPIKE, CONNECTION_UTILIZATION_HIGH]
    checkout_latency:
      anomaly_types: [CHECKOUT_LATENCY_HIGH]
    payment_timeout:
      anomaly_types: [UPSTREAM_TIMEOUT]
      event_types: [UPSTREAM_CONNECTION_TIMEOUT]
    database_pressure:
      anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    checkout_failure:
      anomaly_types: [CHECKOUT_ERROR_ALERT]
    downstream_latency:
      anomaly_types: [CHECKOUT_LATENCY_HIGH]
    upstream_error:
      anomaly_types: [UPSTREAM_SERVICE_FAILURE]
    caller_failure:
      anomaly_types: [CHECKOUT_ERROR_ALERT]
    dns_error:
      anomaly_types: [DNS_RESOLUTION_FAILURE]
    connection_failure:
      anomaly_types: [UPSTREAM_TIMEOUT]
    tls_error:
      anomaly_types: [TLS_HANDSHAKE_FAILURE]
    request_failure:
      anomaly_types: [CHECKOUT_ERROR_ALERT]
    resource_degradation:
      anomaly_types: [CPU_SATURATION, MEMORY_SATURATION, SERVICE_LATENCY_HIGH]
    scan_activity:
      anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, REJECTED_CONNECTION_SPIKE]
    storage_failure:
      anomaly_types: [DATANODE_IO_ERRORS, DISTRIBUTED_SYSTEM_FAILURE]
    trace_degradation:
      anomaly_types: [TRACE_LATENCY_ANOMALY, TRACE_STRUCTURE_ANOMALY]
hypotheses:
  - hypothesis_type: configuration_regression
    entity_types: [gateway, service, database]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 2}
    generation:
      candidate_selector: changed_entity
      requires_recent_change: true
      any_anomaly_types: [FORWARDED_TRAFFIC_SPIKE]
    change_based: true
    plausible_change_keys: [rate_limit.enabled]
    metric_anomaly_types: [FORWARDED_TRAFFIC_SPIKE]
    required_symptoms: [forwarded_traffic_spike, downstream_degradation]
    expected_propagation: [gateway_pressure, checkout_latency, payment_timeout]
    expected_evidence:
      config_diff: "Obtain the gateway rate-limit configuration diff."
      forwarded_rate: "Obtain gateway forwarded-request metrics."
      stable_raw_ingress: "Obtain raw-ingress volume and source-distribution metrics."
      connection_pressure: "Obtain gateway connection-utilization metrics."
      downstream_latency: "Obtain checkout latency metrics."
      timeout_log: "Obtain payment upstream-timeout logs."
      waf_decision_logs: "Obtain WAF decision logs for 09:25–09:35 UTC."
    conflict_patterns: []
    summary: "A gateway rate-limit change is the highest-ranked explanation for the observed traffic and downstream errors."
    diagnostic_step_ids: [inspect-config-diff, compare-pre-post-metrics]
    remediation_step_ids: [propose-config-rollback]
  - hypothesis_type: dos_or_traffic_surge
    entity_types: [gateway]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 2}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [FORWARDED_TRAFFIC_SPIKE, GATEWAY_TRAFFIC_ALERT, RAW_INGRESS_TRAFFIC_SPIKE, SYN_ERROR_RATE_HIGH, SOURCE_DISTRIBUTION_CHANGE, PORT_FANOUT_HIGH]
    change_based: false
    metric_anomaly_types: [FORWARDED_TRAFFIC_SPIKE, RAW_INGRESS_TRAFFIC_SPIKE, SYN_ERROR_RATE_HIGH, SOURCE_DISTRIBUTION_CHANGE]
    required_symptoms: [forwarded_traffic_spike, changed_source_distribution]
    expected_propagation: [gateway_pressure, checkout_latency, payment_timeout]
    expected_evidence:
      raw_ingress: "Obtain gateway raw-ingress metrics."
      source_distribution: "Obtain client/source-distribution metrics."
      waf_decisions: "Obtain WAF decision logs."
    conflict_patterns:
      - pattern_id: STABLE_RAW_INGRESS
        factor: symptom_compatibility
        operation: cap
        value: 0.5
        match:
          event_types: [RAW_INGRESS_RATE]
          absent_anomaly_types: [RAW_INGRESS_SPIKE, SOURCE_DISTRIBUTION_CHANGE]
        statement: "Gateway raw ingress remained stable with no new source distribution."
    summary: "An external traffic surge or SYN flood may explain the gateway pressure and downstream impact."
    diagnostic_step_ids: [inspect-ingress-distribution]
    remediation_step_ids: [propose-edge-rate-limit]
  - hypothesis_type: gateway_capacity_saturation
    entity_types: [gateway]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 2}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [SYN_ERROR_RATE_HIGH]
      any_log_event_types: [SYN_FLOOD_DETECTED]
    change_based: false
    metric_anomaly_types: [ACTIVE_CONNECTION_SPIKE, CONNECTION_UTILIZATION_HIGH, SYN_ERROR_RATE_HIGH]
    required_symptoms: [forwarded_traffic_spike, resource_pressure]
    expected_propagation: [gateway_pressure]
    expected_evidence:
      raw_ingress: "Obtain gateway raw-ingress metrics."
      source_distribution: "Obtain client/source-distribution metrics."
      active_connection_pressure: "Obtain gateway active-connection metrics."
      resource_usage: "Obtain gateway CPU and memory utilization."
    conflict_patterns: []
    summary: "Gateway capacity saturation may explain connection pressure, but requires host-resource evidence to distinguish it from an external traffic surge."
    diagnostic_step_ids: [inspect-ingress-patterns]
    remediation_step_ids: []
  - hypothesis_type: database_connection_exhaustion
    entity_types: [database]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: referenced_dependency
      any_log_event_types: [UPSTREAM_CONNECTION_TIMEOUT]
      referenced_entity_types: [database]
    change_based: false
    topology_origin_event_types: [CHECKOUT_P95_LATENCY, HIGH_CHECKOUT_ERROR_RATE]
    metric_anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    required_symptoms: [payment_timeout, database_utilization_high]
    expected_propagation: [database_pressure, payment_timeout, checkout_failure]
    expected_evidence:
      db_utilization: "Obtain database connection-utilization metrics."
      pool_waits: "Obtain database pool-wait metrics."
      dependency_timeout: "Obtain dependency timeout logs."
    conflict_patterns:
      - pattern_id: NORMAL_DB_UTILIZATION
        factor: metric_anomaly
        operation: cap
        value: 0.0
        match:
          event_types: [DB_CONNECTION_UTILIZATION]
          signal_value_lte: 0.75
        statement: "Payment database connection utilization remained normal."
    summary: "A payment timeout references the database, but normal database utilization conflicts with connection exhaustion."
    diagnostic_step_ids: [inspect-db-pool]
    remediation_step_ids: [propose-db-pool-tuning]
  - hypothesis_type: database_resource_saturation
    entity_types: [database]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    change_based: false
    metric_anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    required_symptoms: [database_utilization_high, resource_pressure]
    expected_propagation: [database_pressure, payment_timeout]
    expected_evidence:
      db_utilization: "Obtain database connection-utilization metrics."
      resource_usage: "Obtain database host CPU and memory utilization."
    conflict_patterns: []
    summary: "Database host resource saturation may exhaust connection capacity, but host CPU and memory evidence is required to distinguish it from pool-specific exhaustion."
    diagnostic_step_ids: [inspect-db-connections]
    remediation_step_ids: []
  - hypothesis_type: database_query_regression
    entity_types: [database]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    change_based: false
    metric_anomaly_types: [DB_CONNECTION_UTILIZATION_HIGH, DB_POOL_EXHAUSTED]
    required_symptoms: [database_utilization_high, payment_timeout, service_latency]
    expected_propagation: [database_pressure, payment_timeout]
    expected_evidence:
      db_utilization: "Obtain database connection-utilization metrics."
      dependency_timeout: "Obtain dependency timeout logs."
      service_latency: "Obtain query or database service latency telemetry."
    conflict_patterns: []
    summary: "A slow-query regression may hold connections long enough to exhaust the pool, but query latency evidence is currently missing."
    diagnostic_step_ids: [review-query-latency]
    remediation_step_ids: []
  - hypothesis_type: network_path_congestion
    entity_types: [gateway, service]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 2}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [PACKET_LOSS_SPIKE, NETWORK_PATH_CONGESTION, SERVICE_LATENCY_HIGH, TRACE_LATENCY_ANOMALY, DNS_RESOLUTION_FAILURE, TLS_HANDSHAKE_FAILURE]
    change_based: false
    metric_anomaly_types: [PACKET_LOSS_SPIKE, TCP_RETRANSMISSION_SPIKE]
    required_symptoms: [packet_loss, retransmissions]
    expected_propagation: [gateway_pressure, downstream_latency]
    expected_evidence: {path_telemetry: "Obtain packet loss and path telemetry."}
    conflict_patterns: []
    summary: "Network path congestion may explain packet loss and retransmissions."
    diagnostic_step_ids: [inspect-network-path]
    remediation_step_ids: []
  - hypothesis_type: resource_saturation
    entity_types: [service]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [CPU_SATURATION, MEMORY_SATURATION, RESOURCE_SATURATION_ANOMALY, NETWORK_LATENCY_HIGH]
      any_log_event_types: [RESOURCE_SATURATION]
    change_based: false
    metric_anomaly_types: [CPU_SATURATION, MEMORY_SATURATION, SERVICE_LATENCY_HIGH]
    required_symptoms: [resource_pressure, service_latency]
    expected_propagation: [resource_degradation]
    expected_evidence:
      resource_usage: "Obtain CPU and memory utilization for the candidate service."
      service_latency: "Obtain service latency telemetry for the candidate service."
      resource_log: "Obtain resource saturation logs for the candidate service."
    conflict_patterns: []
    summary: "CPU and memory saturation in a service may be driving request latency and timeouts."
    diagnostic_step_ids: [inspect-resource-usage, inspect-service-latency]
    remediation_step_ids: [propose-capacity-mitigation]
  - hypothesis_type: external_probe
    entity_types: [gateway]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 1}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, REJECTED_CONNECTION_SPIKE, RECONNAISSANCE_ACTIVITY, SYN_ERROR_RATE_HIGH]
      any_log_event_types: [PORT_SCAN_DETECTED, SYN_FLOOD_DETECTED]
    change_based: false
    metric_anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, REJECTED_CONNECTION_SPIKE]
    required_symptoms: [reconnaissance_fanout, rejected_connections]
    expected_propagation: [scan_activity]
    expected_evidence:
      scan_pattern: "Obtain port and destination fanout telemetry."
      scanner_source: "Obtain the observed scanner source fingerprint."
      connection_rejections: "Obtain rejected-connection telemetry."
    conflict_patterns:
      - pattern_id: AUTHORIZED_SCANNER_MATCH
        factor: symptom_compatibility
        operation: cap
        value: 0.25
        match:
          event_types: [SCANNER_ALLOWLIST_MATCH]
          raw_payload_true_keys: [scanner_authorized, allowlisted]
        statement: "The observed scanner fingerprint is allow-listed for an approved security scan."
    summary: "A reconnaissance probe may explain the unusual port fanout and rejected connections."
    diagnostic_step_ids: [inspect-scan-pattern, validate-scanner-source]
    remediation_step_ids: [propose-source-block]
  - hypothesis_type: authorized_security_scanner
    entity_types: [gateway]
    traversal: {relation_type: sends_traffic_to, direction: forward, max_hops: 1}
    generation:
      candidate_selector: primary_entity
      any_anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, REJECTED_CONNECTION_SPIKE, RECONNAISSANCE_ACTIVITY]
      any_log_event_types: [PORT_SCAN_DETECTED]
    change_based: false
    metric_anomaly_types: [PORT_FANOUT_HIGH, DESTINATION_FANOUT_HIGH, REJECTED_CONNECTION_SPIKE]
    required_symptoms: [reconnaissance_fanout, scanner_authorized]
    expected_propagation: [scan_activity]
    expected_evidence:
      scan_pattern: "Obtain port and destination fanout telemetry."
      scanner_source: "Obtain the observed scanner source fingerprint."
      scanner_authorization: "Verify the scanner fingerprint against the approved scanner allow-list."
      change_ticket: "Obtain the approved security-scan ticket and scheduled execution window."
    conflict_patterns: []
    summary: "An approved internal security scanner may explain the reconnaissance pattern if its identity and change ticket can be verified."
    diagnostic_step_ids: [inspect-scan-pattern, verify-scanner-authorization]
    remediation_step_ids: []
  - hypothesis_type: distributed_storage_node_failure
    entity_types: [storage_node]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [DATANODE_IO_ERRORS, DISTRIBUTED_SYSTEM_FAILURE]
      any_log_event_types: [HDFS_DATANODE_FAILURE]
    change_based: false
    metric_anomaly_types: [DATANODE_IO_ERRORS, DISTRIBUTED_SYSTEM_FAILURE]
    required_symptoms: [datanode_failure]
    expected_propagation: [storage_failure]
    expected_evidence:
      datanode_health: "Obtain DataNode health and I/O error telemetry."
      replication_state: "Obtain HDFS block-replication state."
    conflict_patterns: []
    summary: "A failed HDFS DataNode may explain I/O errors and replica degradation."
    diagnostic_step_ids: [inspect-datanode-health, inspect-replication-state]
    remediation_step_ids: [propose-datanode-isolation]
  - hypothesis_type: storage_network_partition
    entity_types: [storage_node]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [DATANODE_IO_ERRORS, DISTRIBUTED_SYSTEM_FAILURE]
      any_log_event_types: [HDFS_DATANODE_FAILURE]
    change_based: false
    metric_anomaly_types: [DATANODE_IO_ERRORS]
    required_symptoms: [datanode_failure, packet_loss]
    expected_propagation: [storage_failure]
    expected_evidence:
      datanode_health: "Obtain DataNode health and I/O error telemetry."
      path_telemetry: "Obtain storage-network packet loss and path telemetry."
    conflict_patterns: []
    summary: "A storage-network partition may make a healthy DataNode appear failed, but path telemetry is required to separate it from a local disk or node failure."
    diagnostic_step_ids: [inspect-network-path]
    remediation_step_ids: []
  - hypothesis_type: namenode_metadata_failure
    entity_types: [storage_service]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: referenced_dependency
      any_log_event_types: [HDFS_DATANODE_FAILURE]
      referenced_entity_types: [storage_service]
    change_based: false
    metric_anomaly_types: [NAMENODE_FAILURE]
    required_symptoms: [datanode_failure, namenode_failure]
    expected_propagation: [storage_failure]
    expected_evidence:
      replication_state: "Obtain NameNode block-replication and namespace state."
      datanode_health: "Obtain independent DataNode health to exclude a local node failure."
    conflict_patterns: []
    summary: "A NameNode metadata or replication-control failure could produce similar HDFS symptoms, but direct NameNode health evidence is absent."
    diagnostic_step_ids: [inspect-replication-state]
    remediation_step_ids: []
  - hypothesis_type: trace_latency_regression
    entity_types: [service]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [TRACE_LATENCY_ANOMALY, TRACE_STRUCTURE_ANOMALY]
      any_event_types: [TRACE_SPAN]
    change_based: false
    metric_anomaly_types: [TRACE_LATENCY_ANOMALY, TRACE_STRUCTURE_ANOMALY]
    required_symptoms: [trace_latency, trace_structure]
    expected_propagation: [trace_degradation]
    expected_evidence:
      trace_critical_path: "Obtain the distributed trace critical path."
      span_errors: "Obtain erroneous and structurally invalid spans."
    conflict_patterns: []
    summary: "A latency regression on the distributed trace critical path may explain the request failure."
    diagnostic_step_ids: [inspect-trace-critical-path, inspect-span-errors]
    remediation_step_ids: [propose-service-rollback]
  - hypothesis_type: upstream_service_failure
    entity_types: [service]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [UPSTREAM_SERVICE_FAILURE, NETWORK_LATENCY_HIGH, CPU_SATURATION, MEMORY_SATURATION, TRACE_LATENCY_ANOMALY, TRACE_STRUCTURE_ANOMALY, DB_POOL_EXHAUSTED, DNS_RESOLUTION_FAILURE, TLS_HANDSHAKE_FAILURE]
      any_log_event_types: [UPSTREAM_SERVICE_ERROR, RESOURCE_SATURATION, DNS_RESOLUTION_ERROR, TLS_HANDSHAKE_ERROR, CERTIFICATE_INVALID]
    change_based: false
    metric_anomaly_types: [UPSTREAM_SERVICE_FAILURE]
    required_symptoms: [upstream_errors, service_failure_indicator]
    expected_propagation: [upstream_error, caller_failure]
    expected_evidence: {upstream_health: "Obtain upstream health-check results."}
    conflict_patterns: []
    summary: "An upstream service failure may explain errors observed by callers."
    diagnostic_step_ids: [inspect-upstream-health]
    remediation_step_ids: []
  - hypothesis_type: dns_resolution_failure
    entity_types: [service, gateway]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [DNS_RESOLUTION_FAILURE]
      any_log_event_types: [DNS_RESOLUTION_ERROR]
    change_based: false
    metric_anomaly_types: [DNS_RESOLUTION_FAILURE]
    required_symptoms: [dns_errors]
    expected_propagation: [dns_error, connection_failure]
    expected_evidence: {dns_queries: "Obtain DNS query and resolver logs."}
    conflict_patterns: []
    summary: "DNS resolution failures may be preventing service connections."
    diagnostic_step_ids: [inspect-dns-resolution]
    remediation_step_ids: []
  - hypothesis_type: certificate_or_tls_failure
    entity_types: [service, gateway]
    traversal: {relation_type: depends_on, direction: forward, max_hops: 2}
    generation:
      candidate_selector: event_entity
      any_anomaly_types: [TLS_HANDSHAKE_FAILURE]
      any_log_event_types: [TLS_HANDSHAKE_ERROR, CERTIFICATE_INVALID]
    change_based: false
    metric_anomaly_types: [TLS_HANDSHAKE_FAILURE]
    required_symptoms: [tls_handshake_errors]
    expected_propagation: [tls_error, request_failure]
    expected_evidence: {certificate_state: "Obtain certificate validity and TLS handshake details."}
    conflict_patterns: []
    summary: "A certificate or TLS failure may be causing request failures."
    diagnostic_step_ids: [inspect-certificate-state]
    remediation_step_ids: []
