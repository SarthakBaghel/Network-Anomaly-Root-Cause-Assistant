schema_version: "1.0"
version: playbooks-1.4

# This is the sole playbook catalogue consumed by app.playbooks.engine.
# Every action remains a recommendation: a human must approve it before it
# can be carried out by any external system.
steps:
  - step_id: inspect-config-diff
    title: Inspect configuration diff
    step_type: diagnostic
    applicable_hypothesis_types: [configuration_regression]
    applicable_entity_types: [gateway, service, database]
    preconditions: [change_record_available]
    instructions:
      - Compare the current rate-limit configuration with the last known-good version.
      - Identify changes made immediately before the incident window.
    risk_level: low
    rollback_note: Read-only diagnostic; no configuration is changed.
    requires_human_approval: true

  - step_id: compare-pre-post-metrics
    title: Compare pre/post-change metrics
    step_type: diagnostic
    applicable_hypothesis_types: [configuration_regression]
    applicable_entity_types: [gateway, service]
    preconditions: [metric_history_available]
    instructions:
      - Chart forwarded RPS and connection utilization before and after the change.
      - Check whether raw ingress stayed stable while forwarded traffic increased.
    risk_level: low
    rollback_note: Read-only diagnostic; no traffic policy is changed.
    requires_human_approval: true

  - step_id: propose-config-rollback
    title: Propose rate-limit rollback
    step_type: remediation
    applicable_hypothesis_types: [configuration_regression]
    applicable_entity_types: [gateway, service]
    preconditions: [approved_change_ticket, known_good_configuration_available]
    instructions:
      - Prepare a change to re-enable the gateway rate limiter.
      - Present the proposed change and validation plan for human approval; never execute it automatically.
    risk_level: low
    rollback_note: Restore the current configuration value if post-change validation fails.
    requires_human_approval: true

  - step_id: inspect-ingress-distribution
    title: Inspect ingress distribution
    step_type: diagnostic
    applicable_hypothesis_types: [dos_or_traffic_surge]
    applicable_entity_types: [gateway]
    preconditions: [source_metrics_available]
    instructions:
      - Compare source distribution and raw ingress with the incident baseline.
      - Identify abnormal clients, ASNs, geographies, or request paths.
    risk_level: low
    rollback_note: Read-only diagnostic; no edge rule is changed.
    requires_human_approval: true

  - step_id: inspect-ingress-patterns
    title: Inspect ingress traffic patterns
    step_type: diagnostic
    applicable_hypothesis_types: [dos_or_traffic_surge, gateway_capacity_saturation]
    applicable_entity_types: [gateway, service, load_balancer]
    preconditions: [ingress_telemetry_available]
    instructions:
      - Examine request volume, connection rate, and bandwidth during the incident window.
      - Identify abnormal spikes and the endpoints receiving the surge.
    risk_level: low
    rollback_note: Read-only diagnostic; no edge rule is changed.
    requires_human_approval: true

  - step_id: validate-source-distribution
    title: Validate source distribution
    step_type: diagnostic
    applicable_hypothesis_types: [dos_or_traffic_surge]
    applicable_entity_types: [gateway, service, load_balancer]
    preconditions: [source_metrics_available]
    instructions:
      - Aggregate traffic by source and compare it with the healthy baseline.
      - Distinguish an external attack from a legitimate or internal traffic surge.
    risk_level: low
    rollback_note: Read-only diagnostic; no traffic policy is changed.
    requires_human_approval: true

  - step_id: propose-edge-rate-limit
    title: Propose edge rate limiting
    step_type: remediation
    applicable_hypothesis_types: [dos_or_traffic_surge]
    applicable_entity_types: [gateway]
    preconditions: [operator_approval, traffic_source_characterized]
    instructions:
      - Prepare a bounded edge rate-limit proposal for the offending traffic pattern.
      - Submit the proposal for human approval without applying it automatically.
    risk_level: medium
    rollback_note: Remove the approved rule if it blocks valid traffic or validation fails.
    requires_human_approval: true

  - step_id: inspect-db-pool
    title: Inspect database connection pool
    step_type: diagnostic
    applicable_hypothesis_types: [database_connection_exhaustion]
    applicable_entity_types: [database]
    preconditions: [db_metrics_available]
    instructions:
      - Inspect active connections, pool waits, and rejected leases.
      - Compare connection utilization with the configured pool limit.
    risk_level: low
    rollback_note: Read-only diagnostic; no database setting is changed.
    requires_human_approval: true

  - step_id: inspect-db-connections
    title: Inspect database connections
    step_type: diagnostic
    applicable_hypothesis_types: [database_connection_exhaustion, database_resource_saturation]
    applicable_entity_types: [database]
    preconditions: [db_metrics_available]
    instructions:
      - Review active versus maximum connections and connection wait time.
      - Confirm whether the connection pool was exhausted in the incident window.
    risk_level: low
    rollback_note: Read-only diagnostic; no database setting is changed.
    requires_human_approval: true

  - step_id: review-query-latency
    title: Review query latency
    step_type: diagnostic
    applicable_hypothesis_types: [database_connection_exhaustion, database_query_regression]
    applicable_entity_types: [database]
    preconditions: [query_telemetry_available]
    instructions:
      - Identify slow or high-frequency queries holding connections.
      - Correlate query latency with connection-pool saturation.
    risk_level: low
    rollback_note: Read-only diagnostic; no query or database setting is changed.
    requires_human_approval: true

  - step_id: propose-db-pool-tuning
    title: Propose database pool tuning
    step_type: remediation
    applicable_hypothesis_types: [database_connection_exhaustion]
    applicable_entity_types: [database]
    preconditions: [capacity_reviewed, operator_approval]
    instructions:
      - Prepare a bounded pool-size adjustment for human review.
      - Include capacity impact and a validation plan; do not apply the setting automatically.
    risk_level: medium
    rollback_note: Restore the previous pool configuration if errors or saturation increase.
    requires_human_approval: true

  - step_id: inspect-network-path
    title: Inspect network path
    step_type: diagnostic
    applicable_hypothesis_types: [network_path_congestion, storage_network_partition]
    applicable_entity_types: [gateway, service, storage_node]
    preconditions: [path_metrics_available]
    instructions:
      - Inspect packet loss, retransmissions, and hop telemetry along the affected path.
      - Compare the incident window with a healthy baseline.
    risk_level: low
    rollback_note: Read-only diagnostic; no routing policy is changed.
    requires_human_approval: true

  - step_id: inspect-upstream-health
    title: Inspect upstream health
    step_type: diagnostic
    applicable_hypothesis_types: [upstream_service_failure]
    applicable_entity_types: [service]
    preconditions: [health_checks_available]
    instructions:
      - Review upstream health checks and recent error logs.
      - Correlate upstream failures with caller errors during the incident window.
    risk_level: low
    rollback_note: Read-only diagnostic; no upstream deployment is changed.
    requires_human_approval: true

  - step_id: inspect-dns-resolution
    title: Inspect DNS resolution
    step_type: diagnostic
    applicable_hypothesis_types: [dns_resolution_failure]
    applicable_entity_types: [service, gateway]
    preconditions: [resolver_logs_available]
    instructions:
      - Review DNS failures, TTLs, and resolver health.
      - Compare resolver responses from the affected entities with the baseline.
    risk_level: low
    rollback_note: Read-only diagnostic; no DNS record is changed.
    requires_human_approval: true

  - step_id: inspect-certificate-state
    title: Inspect certificate and TLS state
    step_type: diagnostic
    applicable_hypothesis_types: [certificate_or_tls_failure]
    applicable_entity_types: [service, gateway]
    preconditions: [tls_telemetry_available]
    instructions:
      - Review certificate validity, trust-chain, hostname, and expiry details.
      - Correlate TLS handshake failures with the affected request path.
    risk_level: low
    rollback_note: Read-only diagnostic; no certificate or TLS policy is changed.
    requires_human_approval: true

  - step_id: inspect-resource-usage
    title: Inspect service resource usage
    step_type: diagnostic
    applicable_hypothesis_types: [resource_saturation]
    applicable_entity_types: [service]
    preconditions: [resource_metrics_available]
    instructions:
      - Compare CPU and memory utilization with the healthy service baseline.
      - Correlate saturation windows with request latency and timeout logs.
    risk_level: low
    rollback_note: Read-only diagnostic; no workload or capacity is changed.
    requires_human_approval: true

  - step_id: inspect-service-latency
    title: Inspect saturated service latency
    step_type: diagnostic
    applicable_hypothesis_types: [resource_saturation]
    applicable_entity_types: [service]
    preconditions: [latency_metrics_available]
    instructions:
      - Review service latency percentiles across the incident window.
      - Identify operations whose latency rose with resource pressure.
    risk_level: low
    rollback_note: Read-only diagnostic; no service configuration is changed.
    requires_human_approval: true

  - step_id: propose-capacity-mitigation
    title: Propose bounded capacity mitigation
    step_type: remediation
    applicable_hypothesis_types: [resource_saturation]
    applicable_entity_types: [service]
    preconditions: [capacity_reviewed, operator_approval]
    instructions:
      - Prepare a bounded scale-out or workload-throttling proposal.
      - Present impact, validation, and rollback plans for human approval.
    risk_level: medium
    rollback_note: Restore the previous replica or traffic configuration if validation fails.
    requires_human_approval: true

  - step_id: inspect-scan-pattern
    title: Inspect reconnaissance pattern
    step_type: diagnostic
    applicable_hypothesis_types: [external_probe, authorized_security_scanner]
    applicable_entity_types: [gateway]
    preconditions: [connection_telemetry_available]
    instructions:
      - Review destination-port and service fanout for the suspected source.
      - Compare rejected connections with the normal gateway pattern.
    risk_level: low
    rollback_note: Read-only diagnostic; no source is blocked.
    requires_human_approval: true

  - step_id: validate-scanner-source
    title: Validate scanner source
    step_type: diagnostic
    applicable_hypothesis_types: [external_probe]
    applicable_entity_types: [gateway]
    preconditions: [source_fingerprint_available]
    instructions:
      - Correlate the source fingerprint across flow and gateway logs.
      - Confirm that the pattern is not an approved internal scanner.
    risk_level: low
    rollback_note: Read-only diagnostic; no access policy is changed.
    requires_human_approval: true

  - step_id: verify-scanner-authorization
    title: Verify scanner authorization
    step_type: diagnostic
    applicable_hypothesis_types: [authorized_security_scanner]
    applicable_entity_types: [gateway]
    preconditions: [source_fingerprint_available]
    instructions:
      - Match the observed source fingerprint against the approved scanner allow-list.
      - Verify the change ticket and scheduled scan window before classifying the activity as authorized.
    risk_level: low
    rollback_note: Read-only diagnostic; no scanner or gateway policy is changed.
    requires_human_approval: true

  - step_id: propose-source-block
    title: Propose bounded source block
    step_type: remediation
    applicable_hypothesis_types: [external_probe]
    applicable_entity_types: [gateway]
    preconditions: [scanner_source_confirmed, operator_approval]
    instructions:
      - Prepare a time-bounded block for the confirmed scanner fingerprint.
      - Submit the change and validation plan for human approval.
    risk_level: medium
    rollback_note: Remove the approved rule if it affects legitimate traffic.
    requires_human_approval: true

  - step_id: inspect-datanode-health
    title: Inspect DataNode health
    step_type: diagnostic
    applicable_hypothesis_types: [distributed_storage_node_failure]
    applicable_entity_types: [storage_node]
    preconditions: [datanode_telemetry_available]
    instructions:
      - Review DataNode volume, heartbeat, and I/O error telemetry.
      - Identify failed disks and the first affected block operations.
    risk_level: low
    rollback_note: Read-only diagnostic; no HDFS node is changed.
    requires_human_approval: true

  - step_id: inspect-replication-state
    title: Inspect HDFS replication state
    step_type: diagnostic
    applicable_hypothesis_types: [distributed_storage_node_failure, namenode_metadata_failure]
    applicable_entity_types: [storage_node, storage_service]
    preconditions: [namenode_metrics_available]
    instructions:
      - Review under-replicated and missing block counts.
      - Confirm which replicas were hosted by the failed DataNode.
    risk_level: low
    rollback_note: Read-only diagnostic; no replica placement is changed.
    requires_human_approval: true

  - step_id: propose-datanode-isolation
    title: Propose DataNode isolation
    step_type: remediation
    applicable_hypothesis_types: [distributed_storage_node_failure]
    applicable_entity_types: [storage_node]
    preconditions: [replication_headroom_confirmed, operator_approval]
    instructions:
      - Prepare a controlled DataNode decommission or isolation proposal.
      - Require replication validation and human approval before execution.
    risk_level: high
    rollback_note: Recommission the node only after storage health is restored and validated.
    requires_human_approval: true

  - step_id: inspect-trace-critical-path
    title: Inspect trace critical path
    step_type: diagnostic
    applicable_hypothesis_types: [trace_latency_regression]
    applicable_entity_types: [service]
    preconditions: [trace_spans_available]
    instructions:
      - Reconstruct the request critical path from accepted spans.
      - Compare span duration with the declared operation p99 baseline.
    risk_level: low
    rollback_note: Read-only diagnostic; no service is changed.
    requires_human_approval: true

  - step_id: inspect-span-errors
    title: Inspect span errors and structure
    step_type: diagnostic
    applicable_hypothesis_types: [trace_latency_regression]
    applicable_entity_types: [service]
    preconditions: [trace_spans_available]
    instructions:
      - Review erroneous spans and missing parent-child relationships.
      - Confirm whether instrumentation loss or service failure caused the gap.
    risk_level: low
    rollback_note: Read-only diagnostic; no instrumentation is changed.
    requires_human_approval: true

  - step_id: propose-service-rollback
    title: Propose affected service rollback
    step_type: remediation
    applicable_hypothesis_types: [trace_latency_regression]
    applicable_entity_types: [service]
    preconditions: [recent_deployment_identified, operator_approval]
    instructions:
      - Prepare a rollback proposal for the service on the anomalous trace path.
      - Present trace validation and recovery criteria for human approval.
    risk_level: medium
    rollback_note: Restore the newer version if rollback validation fails or introduces errors.
    requires_human_approval: true
