schema_version: "1.0"
version: symptom-families-1.2
families:
  traffic_saturation:
    incident_title: Checkout degradation through API gateway
    event_types:
      - RAW_INGRESS_RATE
      - FORWARDED_REQUEST_RATE
      - ACTIVE_CONNECTIONS
      - CONNECTION_UTILIZATION
      - TCP_RESETS
      - HIGH_FORWARDED_REQUEST_RATE
      - HIGH_FORWARDED_REQUEST_AND_CONNECTION_RATE
      - CHECKOUT_P95_LATENCY
      - UPSTREAM_CONNECTION_TIMEOUT
      - HIGH_CHECKOUT_ERROR_RATE
  database_pressure:
    incident_title: Payment database connection pool exhausted
    event_types:
      - DB_CONNECTION_UTILIZATION
      - DB_POOL_EXHAUSTED
      - DB_CONNECTION_POOL_EXHAUSTED
      - UPSTREAM_CONNECTION_TIMEOUT
  network_path:
    incident_title: Network-path degradation affecting checkout
    event_types:
      - TCP_RETRANSMISSIONS
      - PACKET_LOSS_RATE
      - NETWORK_LATENCY
      - PACKET_LOSS_WARNING
      - NETWORKPATHDEGRADED
  ddos_syn_flood:
    incident_title: DDoS / SYN flood pressure at the gateway
    event_types:
      - RAW_INGRESS_RATE
      - FORWARDED_REQUEST_RATE
      - ACTIVE_CONNECTIONS
      - SYN_ERROR_RATE
      - SOURCE_DISTRIBUTION_CHANGE_SCORE
      - SYN_FLOOD_DETECTED
      - SYNFLOODSUSPECTED
  resource_saturation:
    incident_title: Payment service resource saturation
    event_types:
      - CPU_USAGE_PERCENT
      - MEMORY_USAGE_PERCENT
      - SERVICE_P95_LATENCY
      - RESOURCE_SATURATION
      - UPSTREAM_TIMEOUT
  reconnaissance:
    incident_title: Port-scan reconnaissance at the gateway
    event_types:
      - UNIQUE_DESTINATION_PORTS
      - REJECTED_CONNECTION_RATE
      - DESTINATION_FANOUT
      - PORT_SCAN_DETECTED
      - RECONNAISSANCESUSPECTED
  distributed_storage:
    incident_title: HDFS DataNode failure and replica degradation
    event_types:
      - DATANODE_IO_ERROR_RATE
      - HDFS_DATANODE_FAILURE
      - HDFSREPLICAUNDERREPLICATED
  trace_anomaly:
    incident_title: Distributed trace latency and structure anomaly
    event_types:
      - TRACE_SPAN
  dns_failure:
    incident_title: DNS resolution failure affecting checkout
    event_types:
      - DNS_RESOLUTION_FAILED
  tls_failure:
    incident_title: TLS certificate failure affecting payments
    event_types:
      - TLS_HANDSHAKE_ERROR
  maintenance_warning:
    event_types:
      - CERTIFICATE_EXPIRY_WARNING
incompatibilities:
  - left: maintenance_warning
    right: traffic_saturation
    reason_code: INCOMPATIBLE_MAINTENANCE_SYMPTOM

# Normal records may attach only when they match one of these observable,
# catalogue-backed evidence rules. They still need an identity/topology/trace
# relationship and must meet the ordinary attachment threshold.
attachment_evidence_rules:
  - rule_id: STABLE_RAW_INGRESS
    incident_families: [traffic_saturation]
    event_types: [RAW_INGRESS_RATE]
    conditions:
      at_or_after_opening_symptom: true
  - rule_id: NORMAL_DB_UTILIZATION
    incident_families: [traffic_saturation]
    event_types: [DB_CONNECTION_UTILIZATION]
    conditions:
      at_or_after_opening_symptom: true
      signal_value_lte: 0.75
    attachment_reason_code: CONFLICTING_DB_EVIDENCE
